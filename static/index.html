<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rechnungsgenerator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #2563eb;
      --blue-hover: #1d4ed8;
      --blue-light: #eff6ff;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --red:        #dc2626;
      --red-light:  #fef2f2;
      --radius:     8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: var(--gray-800);
      background: var(--gray-100);
      padding: 32px 16px 64px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .page { max-width: 760px; margin: 0 auto; }

    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--gray-400);
      margin-bottom: 16px;
    }

    .grid { display: grid; gap: 12px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 2fr 1fr 1fr; }
    .span-2 { grid-column: span 2; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: var(--gray-800);
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-light);
    }

    textarea { resize: vertical; min-height: 72px; }

    .profile-summary {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--gray-50);
      border-radius: 6px;
      font-size: 12px;
      color: var(--gray-600);
      display: none;
    }

    /* Line items */
    .items-header {
      display: grid;
      grid-template-columns: 1fr 110px 90px 36px;
      gap: 8px;
      padding: 0 0 6px;
      border-bottom: 1px solid var(--gray-200);
      margin-bottom: 8px;
    }

    .items-header span {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--gray-400);
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr 110px 90px 36px;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .btn-remove {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: var(--gray-100);
      color: var(--gray-600);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: background .15s, color .15s;
    }

    .btn-remove:hover { background: var(--red-light); color: var(--red); }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 7px 14px;
      border: 1px dashed var(--gray-200);
      border-radius: 6px;
      background: none;
      color: var(--blue);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .btn-add:hover { background: var(--blue-light); border-color: var(--blue); }

    /* Inline helper buttons (Heute, +14 Tage, etc.) */
    .input-row { display: flex; gap: 6px; }
    .input-row input { flex: 1; min-width: 0; }

    .btn-helper {
      flex-shrink: 0;
      padding: 0 10px;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      background: var(--gray-50);
      color: var(--gray-600);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn-helper:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--gray-200);
    }
    .toggle-row span { font-size: 13px; color: var(--gray-600); }

    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--gray-200);
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .toggle input:checked + .toggle-slider { background: var(--blue); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Generate buttons */
    .actions { text-align: center; margin-top: 8px; }
    .action-buttons { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    .btn-generate, .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .btn-generate {
      background: var(--blue);
      color: #fff;
      border: 2px solid var(--blue);
    }
    .btn-generate:hover:not(:disabled) { background: var(--blue-hover); border-color: var(--blue-hover); }

    .btn-secondary {
      background: #fff;
      color: var(--blue);
      border: 2px solid var(--blue);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--blue-light); }

    .btn-generate:disabled, .btn-secondary:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--red-light);
      border: 1px solid #fca5a5;
      border-radius: var(--radius);
      color: var(--red);
      font-size: 13px;
      white-space: pre-wrap;
      display: none;
    }

    @media (max-width: 520px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .span-2 { grid-column: span 1; }
    }
  </style>
</head>
<body>
<div class="page">
  <h1>Rechnungsgenerator</h1>

  <!-- Absender -->
  <div class="card">
    <h2>Absender</h2>
    <div>
      <label for="profile">Absender-Profil</label>
      <select id="profile">
        <option value="">— Profil wählen —</option>
      </select>
      <div class="profile-summary" id="profileSummary"></div>
    </div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="useVat" checked>
        <span class="toggle-slider"></span>
      </label>
      <span>Mit Mehrwertsteuer (MwSt.)</span>
    </div>
  </div>

  <!-- Empfänger -->
  <div class="card">
    <h2>Empfänger</h2>
    <div class="grid">
      <div>
        <label for="customerCompany">Firma <span style="color:var(--gray-400)">(optional)</span></label>
        <input type="text" id="customerCompany" placeholder="Muster GmbH">
      </div>
      <div>
        <label for="customerName">Name *</label>
        <input type="text" id="customerName" placeholder="Max Mustermann">
      </div>
      <div>
        <label for="customerStreet">Straße *</label>
        <input type="text" id="customerStreet" placeholder="Musterstraße 1">
      </div>
      <div class="grid grid-2">
        <div>
          <label for="customerZIP">PLZ *</label>
          <input type="text" id="customerZIP" placeholder="12345">
        </div>
        <div>
          <label for="customerCity">Ort *</label>
          <input type="text" id="customerCity" placeholder="Musterstadt">
        </div>
      </div>
    </div>
  </div>

  <!-- Rechnungsdaten -->
  <div class="card">
    <h2>Rechnungsdaten</h2>
    <div class="grid grid-2">
      <div>
        <label for="invoiceDate">Rechnungsdatum *</label>
        <div class="input-row">
          <input type="text" id="invoiceDate" placeholder="TT.MM.JJJJ">
          <button type="button" class="btn-helper" onclick="setToday()">Heute</button>
        </div>
      </div>
      <div>
        <label for="payDate">Zahlungsziel *</label>
        <div class="input-row">
          <input type="text" id="payDate" placeholder="TT.MM.JJJJ">
          <button type="button" class="btn-helper" onclick="setPayDate(14)">+14 Tage</button>
        </div>
      </div>
      <div>
        <label for="invoiceReference">Rechnungsnummer *</label>
        <div class="input-row">
          <input type="text" id="invoiceReference" placeholder="202601-1">
          <button type="button" class="btn-helper" onclick="genReference()">Generieren</button>
        </div>
      </div>
      <div>
        <label for="invoiceSalutation">Anrede</label>
        <input type="text" id="invoiceSalutation" value="Sehr geehrte Damen und Herren,">
      </div>
      <div class="span-2">
        <label for="invoiceText">Rechnungstext *</label>
        <textarea id="invoiceText" rows="3" placeholder="für die erbrachte Leistung erhalten Sie hiermit die Rechnung."></textarea>
      </div>
      <div>
        <label for="invoiceClosing">Grußformel</label>
        <input type="text" id="invoiceClosing" value="Mit freundlichen Grüßen">
      </div>
      <div>
        <label for="invoiceEnclosures">Anlagen <span style="color:var(--gray-400)">(optional, LaTeX)</span></label>
        <input type="text" id="invoiceEnclosures" placeholder="\encl{Anlage 1}">
      </div>
    </div>
  </div>

  <!-- Positionen -->
  <div class="card">
    <h2>Positionen</h2>
    <div style="margin-bottom:16px">
      <label for="projectTitle">Projekttitel *</label>
      <input type="text" id="projectTitle" placeholder="z.B. Catering 01.04.2026">
    </div>
    <div class="items-header">
      <span>Beschreibung</span>
      <span>Einzelpreis (€)</span>
      <span>Menge</span>
      <span></span>
    </div>
    <div id="items"></div>
    <button type="button" class="btn-add" onclick="addItem()">
      <span style="font-size:18px;line-height:1">+</span> Position hinzufügen
    </button>
  </div>

  <!-- Generate -->
  <div class="actions">
    <div class="action-buttons">
      <button class="btn-generate" id="generateBtn" onclick="generateDoc('/generate', 'rechnung', 'generateBtn')">
        <div class="spinner" id="spinnerInv"></div>
        <span>PDF generieren</span>
      </button>
      <button class="btn-secondary" id="lieferscheinBtn" onclick="generateDoc('/lieferschein', 'lieferschein', 'lieferscheinBtn')">
        <div class="spinner" id="spinnerLS"></div>
        <span>Lieferschein erstellen</span>
      </button>
    </div>
    <div id="error"></div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  // Load profiles on startup.
  fetch('/api/profiles')
    .then(r => r.json())
    .then(list => {
      list.sort((a, b) => a.name.localeCompare(b.name));
      const sel = $('profile');
      list.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.key;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
    });

  $('profile').addEventListener('change', async () => {
    const key = $('profile').value;
    const summary = $('profileSummary');
    if (!key) { summary.style.display = 'none'; return; }

    const p = await fetch(`/api/profiles/${key}`).then(r => r.json());
    summary.style.display = 'block';
    summary.textContent = `${p.senderName} · ${p.senderStreet}, ${p.senderZIP} ${p.senderCity} · ${p.senderEmail}`;
  });

  // Date helpers.
  function toDE(date) {
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    return `${d}.${m}.${date.getFullYear()}`;
  }

  function parseDE(str) {
    const [d, m, y] = str.split('.').map(Number);
    return new Date(y, m - 1, d);
  }

  function setToday() {
    $('invoiceDate').value = toDE(new Date());
  }

  function setPayDate(days) {
    const base = $('invoiceDate').value
      ? parseDE($('invoiceDate').value)
      : new Date();
    base.setDate(base.getDate() + days);
    $('payDate').value = toDE(base);
  }

  function genReference() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const n = String(Math.floor(Math.random() * 900) + 100);
    $('invoiceReference').value = `${y}${m}-${n}`;
  }

  // Line items.
  function addItem(desc = '', price = '', qty = '') {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <input type="text" class="item-desc" placeholder="Beschreibung" value="${esc(desc)}">
      <input type="number" class="item-price" placeholder="0.00" step="0.01" min="0" value="${esc(price)}">
      <input type="number" class="item-qty" placeholder="1" step="0.5" min="0" value="${esc(qty)}">
      <button type="button" class="btn-remove" title="Entfernen" onclick="this.closest('.item-row').remove()">×</button>
    `;
    $('items').appendChild(row);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  }

  // Add one empty row on load.
  addItem();

  async function generateDoc(endpoint, filePrefix, btnId) {
    const btn = $(btnId);
    const spinnerId = btnId === 'generateBtn' ? 'spinnerInv' : 'spinnerLS';
    const errorEl = $('error');

    errorEl.style.display = 'none';

    const profileKey = $('profile').value;
    if (!profileKey) { showError('Bitte ein Absender-Profil wählen.'); return; }

    const items = [...document.querySelectorAll('.item-row')].map(row => ({
      description: row.querySelector('.item-desc').value,
      unitPrice:   row.querySelector('.item-price').value,
      quantity:    row.querySelector('.item-qty').value,
    })).filter(i => i.description && i.unitPrice && i.quantity);

    if (items.length === 0) { showError('Mindestens eine vollständige Position erforderlich.'); return; }

    const payload = {
      profileKey,
      invoiceDate:       $('invoiceDate').value,
      payDate:           $('payDate').value,
      invoiceReference:  $('invoiceReference').value,
      invoiceSalutation: $('invoiceSalutation').value,
      invoiceText:       $('invoiceText').value,
      invoiceEnclosures: $('invoiceEnclosures').value,
      invoiceClosing:    $('invoiceClosing').value,
      customerCompany:   $('customerCompany').value,
      customerName:      $('customerName').value,
      customerStreet:    $('customerStreet').value,
      customerZIP:       $('customerZIP').value,
      customerCity:      $('customerCity').value,
      projectTitle:      $('projectTitle').value,
      useVat:            $('useVat').checked,
      items,
    };

    btn.disabled = true;
    $(spinnerId).style.display = 'block';

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        showError(await res.text());
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${filePrefix}-${payload.invoiceReference || 'neu'}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      showError('Netzwerkfehler: ' + e.message);
    } finally {
      btn.disabled = false;
      $(spinnerId).style.display = 'none';
    }
  }

  function showError(msg) {
    const el = $('error');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
